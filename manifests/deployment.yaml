apiVersion: v1
kind: Deployment
metadata:
  name: discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery
  template:
    metadata:
      labels:
        app: discovery
    spec: null
nodeSelector: null
beta.kubernetes.io/os: linux
containers:
  - name: discovery
    image: 'acrr11.azurecr.io/discoveryserver.git:latest'
resources: null
requests: null
cpu: 100m
memory: 128Mi
ports:
  - containerPort: 80
  
---
apiVersion: v1
kind: Service
metadata:
  name: discovery
spec:
  type: LoadBalancer
  ports:
    - port: 80
  selector:
    app: discovery
		
     
