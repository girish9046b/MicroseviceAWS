apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: crd-lister
rules:
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["list", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: read-crds-binding
subjects:
- kind: ServiceAccount # Or 'User' based on your error
  name: SCN-K3
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: crd-lister
  apiGroup: rbac.authorization.k8s.io
  
---
apiVersion : v1
kind: Deployment
metadata:
  name: discovery
spec:
  replicas: 1
  selector:
    matchLabels:
      app: discovery
  template:
    metadata:
      labels:
        app: discovery 
    spec:
      containers:
        - name: discovery 
          image: acrr11.azurecr.io/discoveryserver.git:#{Build.BuildId}#
          ports:
          - containerPort: 80