
apiVersion : apps/v1
kind: Deployment
metadata:
  name: discovery
spec:
  replicas: 2
  selector:
    matchLabels:
      app: discovery
  template:
    metadata:
      labels:
        app: discovery 
    spec:
      containers:
        - name: discovery 
          image: acr33.azurecr.io/discoveryserver.git:latest
          ports:
          - containerPort: 80
