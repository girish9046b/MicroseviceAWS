apiVersion : v1
kind: Deployment
metadata:
  name: microserviceadd
spec:
  replicas: 1
  selector:
    matchLabels:
      app: microserviceadd
  template:
    metadata:
      labels:
        app: microserviceadd 
    spec:
      containers:
        - name: microserviceadd 
          image: resortacr1.azurecr.io/microservice2:#{Build.BuildId}#
          ports:
          - containerPort: 8080

apiVersion: v1
kind: Service
metadata:
    name: microserviceadd
spec:
    type: LoadBalancer
    ports:
    - port: 8080 
    selector:
        app: microserviceadd